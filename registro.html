<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="body-formulario bg-gris">

    <div class="registro-container">
        <div class="registro-izquierdo">
            <h2>Registrarse</h2>
            <form onsubmit="return false;">
                <div class="input-line">
                    <label>Nombre</label>
                    <input type="text" required>
                </div>
                <div class="input-line">
                    <label>Correo</label>
                    <input type="email" required>
                </div>
                <div class="input-line">
                    <label>Contraseña</label>
                    <input type="password" required>
                </div>
                <div class="input-line">
                    <label>Confirmar contraseña</label>
                    <input type="password" required>
                </div>
                <button type="submit" class="btn-registro">REGISTRARSE</button>
            </form>
        </div>
        
        <div class="registro-derecho">
            <h2>Iniciar Sesión</h2>
            <div class="social-login-buttons">
                <button class="btn-social fb">Acceder con Facebook</button>
                <button class="btn-social tw">Acceder con Twitter</button>
                <button class="btn-social mail">Acceder con Correo</button>
            </div>
        </div>
    </div>

</body>
</html>
