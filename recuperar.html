<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="body-formulario">

    <div class="recuperar-card">
        <h1>Restablezca su contraseña</h1>
        <div class="linea-decorativa"></div>
        <p class="instruccion-text">Le enviaremos un correo electrónico con más instrucciones sobre cómo restablecer su contraseña.</p>
        
        <form onsubmit="return false;">
            <div class="input-icon-group">
                <span class="icon-mail">✉️</span>
                <input type="email" placeholder="Correo electrónico" required>
            </div>
            <button type="submit" class="btn-enviar-email">Enviar un email</button>
        </form>
    </div>

</body>
</html>
